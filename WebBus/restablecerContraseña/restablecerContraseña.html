<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Restablece tu contraseña de WebBus.">
    <title>Restablecer Contraseña | WebBus</title>
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="../recuperarContraseña/recuperarContraseña.css">
</head>
<body class="auth-body">

    <div class="auth-bg"></div>
    <div class="auth-bg-overlay"></div>

    <div class="auth-wrapper">
        <main class="auth-panel auth-panel-center">
            <div class="auth-form-wrap">
                <a href="../iniciowebbus/index.html" class="auth-brand-logo-center">
                    <img src="../imagenes/iconoWebBus.png" alt="WebBus Logo">
                    <span>WebBus</span>
                </a>

                <div class="auth-form-header">
                    <h1>Crear nueva contraseña</h1>
                    <p>Ingresa tu nueva contraseña para restablecer el acceso a tu cuenta.</p>
                </div>

                <!-- Mensaje de token inválido (oculto por defecto) -->
                <div id="tokenError" style="display:none; text-align:center; padding: 20px 0;">
                    <p style="font-size:40px; margin-bottom:12px;">⛔</p>
                    <p style="color: rgba(255,255,255,0.85); font-size:15px; line-height:1.6; margin-bottom:20px;" id="tokenErrorMsg">
                        El enlace de recuperación es inválido o ha expirado.
                    </p>
                    <a href="../recuperarContraseña/recuperarContraseña.html"
                       class="wb-btn wb-btn-primary" style="display:inline-block; padding: 12px 28px;">
                        Solicitar nuevo enlace
                    </a>
                </div>

                <form id="resetPasswordForm" class="auth-form" novalidate>
                    <div class="wb-form-group">
                        <label class="wb-label" for="newPassword">Nueva contraseña</label>
                        <div class="input-password-wrap">
                            <input
                                class="wb-input"
                                type="password"
                                id="newPassword"
                                placeholder="Mínimo 8 caracteres"
                                autocomplete="new-password"
                                required
                            >
                            <button type="button" class="eye-btn" data-target="newPassword" aria-label="Mostrar contraseña">
                                <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg class="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="wb-form-group">
                        <label class="wb-label" for="confirmPassword">Confirmar contraseña</label>
                        <div class="input-password-wrap">
                            <input
                                class="wb-input"
                                type="password"
                                id="confirmPassword"
                                placeholder="Repite tu contraseña"
                                autocomplete="new-password"
                                required
                            >
                            <button type="button" class="eye-btn" data-target="confirmPassword" aria-label="Mostrar contraseña">
                                <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg class="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="wb-btn wb-btn-primary wb-btn-full auth-submit">
                        Restablecer Contraseña
                    </button>

                    <p class="auth-switch">
                        ¿Recordaste tu contraseña?
                        <a href="../inicioSesion/inicioSesion.html">Iniciar sesión</a>
                    </p>
                </form>
            </div>
        </main>
    </div>

    <footer class="wb-footer auth-footer">
        © 2026 <span>WebBus</span> — Nicole Castilla · Marlon Pertuz · Joshua Castro
    </footer>

    <script src="restablecerContraseña.js"></script>
    <script src="../eyeToggle.js"></script>
</body>
</html>
