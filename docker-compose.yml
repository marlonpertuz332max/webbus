version: '3.8'

services:
  # Servicio de Base de Datos
  db:
    image: mysql:8.0
    container_name: webbus-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: rutas_buses
      MYSQL_USER: user
      MYSQL_PASSWORD: user_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Inicialización automática de la base de datos
      - ./database:/docker-entrypoint-initdb.d
    networks:
      - webbus-network

  # Servicio Web (PHP + Apache)
  web:
    build: .
    container_name: webbus-app
    restart: always
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_USER=user
      - DB_PASS=user_password
      - DB_NAME=rutas_buses
      - DB_PORT=3306
    depends_on:
      - db
    networks:
      - webbus-network

networks:
  webbus-network:
    driver: bridge

volumes:
  db_data:
